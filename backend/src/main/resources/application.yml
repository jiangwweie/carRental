server:
  port: 8081

spring:
  application:
    name: car-rental
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:car_rental}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.carrental.infrastructure.persistence.dataobject
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

wx:
  miniapp:
    appid: ${WX_APPID:placeholder}
    secret: ${WX_SECRET:placeholder}

jwt:
  secret: ${JWT_SECRET:change-me-to-a-random-string-in-production}
  expiration: 604800000  # 7 days in milliseconds

admin:
  password: ${ADMIN_PASSWORD:admin123}

# 文件上传配置 (v1.6)
upload:
  # 存储类型: local (本地) / oss (阿里云)
  type: local
  # 本地存储配置
  local:
    # 上传根目录（相对于项目根目录或绝对路径）
    base-path: ${UPLOAD_PATH:uploads}
    # URL 前缀
    url-prefix: /uploads
  # 文件限制
  limits:
    # 最大文件大小 (字节) - 5MB
    max-size: 5242880
    # 允许的文件类型
    allowed-types: jpg,jpeg,png,webp
    # 最小图片尺寸
    min-dimension: 100
    # 最大图片尺寸
    max-dimension: 4096
